<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💌 Anniversaire</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #2b2b3c, #14141f);
    font-family: Arial, sans-serif;
}

/* ENVELOPPE */
.envelope {
    position: relative;
    width: 340px;
    height: 220px;
    background: #f2e9e4;
    border-radius: 10px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    cursor: pointer;
    overflow: hidden;
}

/* TRIANGLE FERMETURE */
.flap {
    position:absolute;
    width:100%;
    height:100%;
    background:#ded4cc;
    clip-path: polygon(0 0, 50% 55%, 100% 0);
    transform-origin: top;
    transition: 0.8s ease;
    z-index:3;
}

/* LETTRE */
.letter {
    position:absolute;
    width:90%;
    height:85%;
    background:white;
    top:100%;
    left:5%;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    font-size:22px;
    color:#d62828;
    transition: 1s ease;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* CACHET CIRE */
.seal {
    position:absolute;
    width:65px;
    height:65px;
    background:#c9184a;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:5;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 15px rgba(255,0,80,0.6);
    animation: pulse 1.8s infinite;
}

.seal::before{
    content:"❤";
    color:white;
    font-size:26px;
}

/* animation glow */
@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.1);}
    100%{transform:translate(-50%,-50%) scale(1);}
}

/* OPEN STATE */
.envelope.open .flap{
    transform: rotateX(180deg);
}

.envelope.open .letter{
    top:20px;
}

.envelope.open .seal{
    opacity:0;
    transform: scale(0.5);
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter(this)">
    <div class="flap"></div>

    <div class="letter">
        <div>
            <h1>Joyeux anniversaire mon chat ❤️</h1>
        </div>
    </div>

    <div class="seal"></div>
</div>

<script>
function openLetter(el){
    el.classList.add("open");
}
</script>

</body>
</html>
