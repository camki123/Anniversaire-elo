<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f14;
}

/* ENVELOPPE */
.envelope{
    position:relative;
    width:360px;
    height:240px;
    cursor:pointer;
    perspective:1000px;
}

/* BASE */
.base{
    width:100%;
    height:100%;
    background:#e7d7c9;
    border-radius:10px;
    position:absolute;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* FLAP */
.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#d8c2b0;
    clip-path: polygon(0 0, 50% 55%, 100% 0);
    transform-origin:top;
    transition:1s ease;
    z-index:3;
}

/* CIRE REALISTE */
.seal{
    position:absolute;
    width:70px;
    height:70px;
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #7a001c);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:5;
    box-shadow:0 0 20px rgba(255,0,60,0.4);
    transition:0.6s ease;
}

.seal::before{
    content:"❤";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:26px;
}

/* LETTRE */
.letter{
    position:absolute;
    width:90%;
    height:90%;
    top:5%;
    left:5%;
    background:#fdf6ee;
    border:1px solid rgba(0,0,0,0.1);
    border-radius:6px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    font-family:'Dancing Script', cursive;
    font-size:32px;
    color:#2b2b2b;

    transform: translateY(120%);
    transition:1s ease;
    padding:20px;
}

/* CADRE VINTAGE */
.letter::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid rgba(0,0,0,0.15);
    border-radius:4px;
    pointer-events:none;
}

/* OUVERTURE */
.envelope.open .flap{
    transform:rotateX(180deg);
}

.envelope.open .letter{
    transform:translateY(0);
}

.envelope.open .seal{
    opacity:0;
    transform:translate(-50%,-50%) scale(0.3);
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter(this)">
    <div class="base"></div>
    <div class="flap"></div>
    <div class="seal"></div>

    <div class="letter">
        Joyeux anniversaire mon chat ❤️
    </div>
</div>

<script>
function openLetter(el){
    el.classList.add("open");
}
</script>

</body>
</html>
